<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fdf6ec">
  <title>いぬねこ図鑑 — スマホをはなれて そだてる いぬねこ</title>
  <link rel="stylesheet" href="css/styles.css?v=mqd9owem">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">いぬねこ図鑑<small>スマホをはなれて そだてる いぬねこ</small></div>
      <div class="coin-badge"><span class="c"></span><span id="coin">0</span></div>
    </div>

    <div class="stage-card">
      <div class="scene" id="scene">
        <div class="room-slot rs-wall" id="rsWall"></div>
        <div class="room-slot rs-left" id="rsLeft"></div>
        <div class="room-slot rs-right" id="rsRight"></div>
        <div class="room-slot rs-floor" id="rsFloor"></div>
        <div id="petArt" class="pet-stage"></div>
        <div id="petWear" class="pet-wear"></div>
        <button id="roomBtn" class="room-btn" aria-label="もようがえ">🛋️</button>
        <button id="wearBtn" class="wear-btn" aria-label="きせかえ">👕</button>
      </div>
      <div id="petName" class="pet-name">&nbsp;</div>
      <div id="petSub" class="pet-sub">&nbsp;</div>
      <div id="petRarity"></div>
      <div class="grow-wrap">
        <div class="grow-label"><span id="growStage"></span><span id="growPct"></span></div>
        <div class="grow-bar"><div id="growFill" class="grow-fill"></div></div>
      </div>
      <div id="lifeRow" class="life-row"></div>
    </div>

    <div id="stats" class="stats"></div>
    <div id="care" class="care-grid"></div>

    <button id="walkBtn" class="big-btn primary walk-btn">🐾 おすわり（スマホを置く）</button>
    <button id="taskBtn" class="big-btn ghost walk-btn">🐾 お散歩（読書・英語・運動・ダイエット）</button>
    <div id="taskRow" class="task-row"></div>

    <div class="foot">
      <button id="dexBtn" class="big-btn ghost">📖 図鑑</button>
      <button id="actBtn" class="big-btn ghost">…</button>
    </div>
    <div class="center">
      <button id="settingsBtn" style="border:none;background:transparent;color:var(--ink-soft);font-size:12px;padding:4px;cursor:pointer;font-family:inherit;">⚙ せってい</button>
    </div>
  </div>

  <div id="walkOverlay"></div>
  <div id="sanpoOverlay"></div>
  <div id="modalRoot"></div>
  <div id="toast"></div>

  <script src="js/native.js?v=mqd9owem"></script>
  <script src="js/breeds.js?v=mqd9owem"></script>
  <script src="js/art.js?v=mqd9owem"></script>
  <script src="assets/sprites/manifest.js?v=mqd9owem"></script>
  <script src="assets/sprites/eyepos.js?v=mqd9owem"></script>
  <script src="js/engine.js?v=mqd9owem"></script>
  <script src="js/ui.js?v=mqd9owem"></script>
</body>
</html>
