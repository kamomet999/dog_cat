<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fdf6ec">
  <title>いぬねこ図鑑 — 放置でそだてるたまごっち</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">いぬねこ図鑑<small>放置でそだてるたまごっち</small></div>
      <div class="coin-badge"><span class="c"></span><span id="coin">0</span></div>
    </div>

    <div class="stage-card">
      <div class="scene">
        <div id="petArt" class="pet-stage"></div>
      </div>
      <div id="petName" class="pet-name">&nbsp;</div>
      <div id="petSub" class="pet-sub">&nbsp;</div>
      <div id="petRarity"></div>
      <div class="grow-wrap">
        <div class="grow-label"><span id="growStage"></span><span id="growPct"></span></div>
        <div class="grow-bar"><div id="growFill" class="grow-fill"></div></div>
      </div>
    </div>

    <div id="stats" class="stats"></div>
    <div id="care" class="care-grid"></div>

    <div class="foot">
      <button id="dexBtn" class="big-btn ghost">📖 ずかん</button>
      <button id="actBtn" class="big-btn primary">…</button>
    </div>
    <div class="center">
      <button id="settingsBtn" style="border:none;background:transparent;color:var(--ink-soft);font-size:12px;padding:4px;cursor:pointer;font-family:inherit;">⚙ せってい</button>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toast"></div>

  <script src="js/breeds.js"></script>
  <script src="js/art.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
